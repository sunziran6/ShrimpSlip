server:
  port: 8081

spring:
  application:
    name: app-user
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        import-check:
          enabled: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/shrimpslip?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

shrimp:
  jwt:
    secret: ${JWT_SECRET:}
    access-token-expire: 7200
    refresh-token-expire: 604800
